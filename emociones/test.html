        .subtitle { font-size: 1.2rem; color: #4B5563; max-width: 700px; margin: 0 auto; font-weight: 500; }

        .progress-bar { width: 100%; height: 8px; background-color: #374151; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--light-yellow); width: 0%; transition: width 0.3s ease; }

        .question-card { display: none; animation: fadeIn 0.4s ease; }
        .question-card.active { display: block; }
        
        .question-num { color: var(--cool-blue); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .question-text { font-size: 1.5rem; font-family: 'Georgia', serif; margin-bottom: 30px; line-height: 1.4; color: white; }

        .options-grid { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-option { background-color: #1F2937; color: white; border: 2px solid #4B5563; padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .btn-option:hover { background-color: #374151; border-color: var(--cool-blue); transform: translateX(5px); }
        
        /* --- RESULTADOS --- */
        .result-container { display: none; text-align: center; animation: fadeIn 0.6s ease; }
        .result-icon { font-size: 5rem; margin-bottom: 10px; }
        .result-title { font-family: 'Arial Black', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 15px; }
        .result-score { font-size: 1.2rem; color: #9CA3AF; margin-bottom: 25px; }
        
        .diagnosis-box { background-color: #1F2937; padding: 30px; border-radius: 12px; border-left: 5px solid; text-align: left; font-size: 1.15rem; line-height: 1.7; margin-bottom: 30px; }
        
        .btn-action { display: inline-block; background: linear-gradient(135deg, var(--cool-blue), #0284C7); color: white; font-family: 'Arial Black', sans-serif; font-size: 1.2rem; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; text-transform: uppercase; text-decoration: none; box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4); transition: transform 0.2s; }
        .btn-action:hover { transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    </style>

        const questions = [
            {

                options: [

        let currentQuestion = 0;
        let totalScore = 0;
        const maxScore = 18; // Suma de todos los valores mÃ¡ximos

        const wrapper = document.getElementById('questions-wrapper');
        const progressBar = document.getElementById('progress');

        // Generar HTML de las preguntas
        function initQuiz() {
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = `question-card ${index === 0 ? 'active' : ''}`;
                card.id = `q-${index}`;
                
                let optionsHtml = '';
                q.options.forEach(opt => {
                    optionsHtml += `<button class="btn-option" onclick="answerQuestion(${opt.value})">${opt.text} <span>âž”</span></button>`;
                });

                card.innerHTML = `
                    <div class="question-num">Pregunta ${index + 1} de ${questions.length}</div>
                    <div class="question-text">"${q.text}"</div>
                    <div class="options-grid">${optionsHtml}</div>
                `;
                wrapper.appendChild(card);
            });
            updateProgress();
        }

        function answerQuestion(value) {
            totalScore += value;
            
            // Ocultar actual
            document.getElementById(`q-${currentQuestion}`).classList.remove('active');
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                // Mostrar siguiente
                document.getElementById(`q-${currentQuestion}`).classList.add('active');
                updateProgress();
            } else {
                // Finalizar
                showResults();
            }
        }

        function updateProgress() {
            const percent = (currentQuestion / questions.length) * 100;
            progressBar.style.width = `${percent}%`;
        }

        function showResults() {
            document.getElementById('quiz-container').style.display = 'none';
            const resCont = document.getElementById('result-container');
            resCont.style.display = 'block';
            
            const icon = document.getElementById('res-icon');
            const title = document.getElementById('res-title');
            const scoreText = document.getElementById('res-score');
            const box = document.getElementById('diagnosis-box');

            scoreText.innerText = `Nivel de riesgo: ${totalScore} puntos`;

            if (totalScore <= 4) {
                icon.innerText = "ðŸ§ ";
