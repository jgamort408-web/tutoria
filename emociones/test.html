<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de la Ira - Gimnasio Emocional</title>
    <style>
        :root {
            --bg-dark: #111827; --text-light: #F9FAFB; --volcano-rock: #374151;
            --light-red: #DC2626; --light-yellow: #FACC15; --light-green: #16A34A;
            --cool-blue: #0EA5E9; --bg-color: transparent;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-light); display: flex; flex-direction: column; align-items: center; line-height: 1.6; }
        .main-container { width: 100%; max-width: 800px; padding: 30px 15px; }

        /* --- CABECERA --- */
        .header { text-align: center; margin-bottom: 40px; color: var(--bg-dark); }
        .header h1 { font-family: 'Arial Black', Impact, sans-serif; color: var(--light-red); font-size: 2.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .subtitle { font-size: 1.2rem; color: #4B5563; max-width: 700px; margin: 0 auto; font-weight: 500; }

        /* --- CUESTIONARIO --- */
        .quiz-container { background-color: var(--bg-dark); border-radius: 16px; padding: 40px 30px; border: 4px solid var(--volcano-rock); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .progress-bar { width: 100%; height: 8px; background-color: #374151; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--light-yellow); width: 0%; transition: width 0.3s ease; }

        .question-card { display: none; animation: fadeIn 0.4s ease; }
        .question-card.active { display: block; }
        
        .question-num { color: var(--cool-blue); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .question-text { font-size: 1.5rem; font-family: 'Georgia', serif; margin-bottom: 30px; line-height: 1.4; color: white; }

        .options-grid { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-option { background-color: #1F2937; color: white; border: 2px solid #4B5563; padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .btn-option:hover { background-color: #374151; border-color: var(--cool-blue); transform: translateX(5px); }
        
        /* --- RESULTADOS --- */
        .result-container { display: none; text-align: center; animation: fadeIn 0.6s ease; }
        .result-icon { font-size: 5rem; margin-bottom: 10px; }
        .result-title { font-family: 'Arial Black', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 15px; }
        .result-score { font-size: 1.2rem; color: #9CA3AF; margin-bottom: 25px; }
        
        .diagnosis-box { background-color: #1F2937; padding: 30px; border-radius: 12px; border-left: 5px solid; text-align: left; font-size: 1.15rem; line-height: 1.7; margin-bottom: 30px; }
        
        .btn-action { display: inline-block; background: linear-gradient(135deg, var(--cool-blue), #0284C7); color: white; font-family: 'Arial Black', sans-serif; font-size: 1.2rem; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; text-transform: uppercase; text-decoration: none; box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4); transition: transform 0.2s; }
        .btn-action:hover { transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="header">
            <h1>Termómetro de la Ira</h1>
            <p class="subtitle">Un test confidencial y serio para evaluar tu nivel de autocontrol. Sé honesto contigo mismo: mentir en las respuestas solo sirve para autoengañarte.</p>
        </div>

        <div class="quiz-container" id="quiz-container">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            
            <div id="questions-wrapper">
                </div>
        </div>

        <div class="quiz-container result-container" id="result-container">
            <div class="result-icon" id="res-icon">🌋</div>
            <div class="result-title" id="res-title">Perfil</div>
            <div class="result-score" id="res-score">Puntuación: 0 / 24</div>
            
            <div class="diagnosis-box" id="diagnosis-box">
                </div>

            <p style="color: #D1D5DB; margin-bottom: 20px;">Es el momento de empezar a entrenar tu mente.</p>
            <button class="btn-action" onclick="alert('En Google Sites, enlaza esto al Cuartel General o al Volcán')">Entrar al Gimnasio Emocional ➔</button>
        </div>

    </div>

    <script>
        // Base de datos de preguntas psicológicas (1 = bajo riesgo, 2 = medio, 3 = alto riesgo)
        // La pregunta 8 es de control positivo (está invertida en valores).
        const questions = [
            {
                text: "Cuando me enfado muchísimo, digo cosas muy crueles de las que luego me arrepiento.",
                options: [
                    { text: "Casi nunca.", value: 0 },
                    { text: "A veces, si me provocan mucho.", value: 1 },
                    { text: "A menudo. Pierdo el filtro de lo que digo.", value: 2 }
                ]
            },
            {
                text: "He llegado a romper cosas, dar golpes a la pared o dar portazos por culpa de la rabia.",
                options: [
                    { text: "Nunca.", value: 0 },
                    { text: "Alguna vez aislada.", value: 1 },
                    { text: "Sí, mi cuerpo reacciona antes que mi cabeza.", value: 3 } // Vale 3 porque la agresión física es un red flag mayor
                ]
            },
            {
                text: "Siento que paso de estar tranquilo a 'explotar' al 100% en cuestión de un segundo, sin avisar.",
                options: [
                    { text: "No, suelo notar que me voy enfadando poco a poco.", value: 0 },
                    { text: "Depende del día o de la persona.", value: 1 },
                    { text: "Sí. Es como si me encendieran un interruptor.", value: 2 }
                ]
            },
            {
                text: "Si un profesor me llama la atención o me riñe en público...",
                options: [
                    { text: "Me callo (aunque me moleste) y hablo luego con él.", value: 0 },
                    { text: "Pongo malas caras o murmuro por lo bajo.", value: 1 },
                    { text: "Le contesto de forma desafiante automáticamente.", value: 2 }
                ]
            },
            {
                text: "Cuando me meto en un lío por haber gritado o insultado, suelo pensar que...",
                options: [
                    { text: "Fue mi culpa por perder los nervios.", value: 0 },
                    { text: "Ambos tuvimos parte de culpa.", value: 1 },
                    { text: "Fue culpa suya. Si no me hubieran provocado, no habría pasado.", value: 3 } // Locus de control externo = 3 puntos
                ]
            },
            {
                text: "La gente que me conoce bien (familia o amigos) me ha dicho alguna vez que tengo 'mal carácter' o que a veces doy miedo.",
                options: [
                    { text: "Nunca me han dicho eso.", value: 0 },
                    { text: "Alguna vez me han dicho que me altero mucho.", value: 1 },
                    { text: "Sí, me lo han dicho varias veces.", value: 2 }
                ]
            },
            {
                text: "Si alguien me hace una broma pesada o me ofende...",
                options: [
                    { text: "Me enfado un rato pero se me pasa rápido.", value: 0 },
                    { text: "Le pido explicaciones y me cuesta olvidarlo.", value: 1 },
                    { text: "No lo perdono y busco la forma de devolvérsela (venganza).", value: 2 }
                ]
            },
            {
                text: "Soy capaz de notar físicamente mi enfado (calor, tensión en las manos, respiración) ANTES de gritar o pelear.",
                options: [
                    { text: "Sí, siempre me doy cuenta.", value: 0 },
                    { text: "Solo a veces.", value: 1 },
                    { text: "No. Cuando me doy cuenta ya he explotado.", value: 2 }
                ]
            }
        ];

        let currentQuestion = 0;
        let totalScore = 0;
        const maxScore = 18; // Suma de todos los valores máximos

        const wrapper = document.getElementById('questions-wrapper');
        const progressBar = document.getElementById('progress');

        // Generar HTML de las preguntas
        function initQuiz() {
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = `question-card ${index === 0 ? 'active' : ''}`;
                card.id = `q-${index}`;
                
                let optionsHtml = '';
                q.options.forEach(opt => {
                    optionsHtml += `<button class="btn-option" onclick="answerQuestion(${opt.value})">${opt.text} <span>➔</span></button>`;
                });

                card.innerHTML = `
                    <div class="question-num">Pregunta ${index + 1} de ${questions.length}</div>
                    <div class="question-text">"${q.text}"</div>
                    <div class="options-grid">${optionsHtml}</div>
                `;
                wrapper.appendChild(card);
            });
            updateProgress();
        }

        function answerQuestion(value) {
            totalScore += value;
            
            // Ocultar actual
            document.getElementById(`q-${currentQuestion}`).classList.remove('active');
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                // Mostrar siguiente
                document.getElementById(`q-${currentQuestion}`).classList.add('active');
                updateProgress();
            } else {
                // Finalizar
                showResults();
            }
        }

        function updateProgress() {
            const percent = (currentQuestion / questions.length) * 100;
            progressBar.style.width = `${percent}%`;
        }

        function showResults() {
            document.getElementById('quiz-container').style.display = 'none';
            const resCont = document.getElementById('result-container');
            resCont.style.display = 'block';
            
            const icon = document.getElementById('res-icon');
            const title = document.getElementById('res-title');
            const scoreText = document.getElementById('res-score');
            const box = document.getElementById('diagnosis-box');

            scoreText.innerText = `Nivel de riesgo: ${totalScore} puntos`;

            if (totalScore <= 4) {
                icon.innerText = "🧠";
                title.innerText = "Piloto Experto";
                title.style.color = "var(--light-green)";
                box.style.borderColor = "var(--light-green)";
                box.innerHTML = "<strong>Tienes un excelente dominio de ti mismo.</strong> Sabes que enfadarse es normal, pero no dejas que la ira tome el control del volante. Eres capaz de parar, pensar y actuar con inteligencia. Entrar en el Gimnasio Emocional te servirá para perfeccionar tus técnicas y ayudar a otros compañeros que lo necesiten.";
            } 
            else if (totalScore >= 5 && totalScore <= 10) {
                icon.innerText = "⚠️";
                title.innerText = "Motor Sobrecargado";
                title.style.color = "var(--light-yellow)";
                box.style.borderColor = "var(--light-yellow)";
                box.innerHTML = "<strong>Estás en la zona de alerta.</strong> Generalmente te controlas, pero hay situaciones o personas que consiguen hacerte saltar. A veces dices o haces cosas de las que luego te arrepientes. Tu principal objetivo en el Gimnasio Emocional será aprender a hacer la 'Pausa de 10 segundos' antes de reaccionar impulsivamente.";
            } 
            else {
                icon.innerText = "🌋";
                title.innerText = "El Volcán Activo";
                title.style.color = "var(--light-red)";
                box.style.borderColor = "var(--light-red)";
                box.innerHTML = "<strong>Alerta Roja. La ira te controla a ti, no tú a ella.</strong> Tu impulsividad te está haciendo daño: te metes en problemas, te ganas castigos y alejas a la gente. La culpa no es de los demás por provocarte, es tuya por regalarles tu poder. Necesitas entrenar urgentemente en el Gimnasio Emocional para aprender a leer las señales físicas de tu cuerpo antes de explotar.";
            }
        }

        // Iniciar el test
        initQuiz();
    </script>
    
    <script async src="https://jgamort408-web.github.io/profesor/tutoria/footer_8m.js?v=12"></script>
</body>
</html>
